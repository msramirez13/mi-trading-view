<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1e222d">
<title>Mi TradingView</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="styles.css?v=26">
</head>
<body>

<header id="toolbar">
  <div class="brand">📈 Mi TradingView</div>

  <select id="market" title="Mercado">
    <option value="binance">Binance</option>
    <option value="kucoin">Bybit</option>
    <option value="yahoo">Acciones · CEDEARs</option>
  </select>

  <div class="symbol-box">
    <input id="symbol" list="symbol-list" value="BTCUSDT" spellcheck="false"
           autocomplete="off" placeholder="Símbolo">
    <datalist id="symbol-list"></datalist>
    <button id="load-btn" title="Cargar símbolo">Cargar</button>
  </div>

  <button id="tf-btn" title="Temporalidad">1h ▾</button>
  <button id="ind-btn" title="Indicadores">ƒ Indicadores ▾</button>
  <button id="draw-btn" title="Herramientas de dibujo">✏ ⌖ ▾</button>
  <button id="alert-btn" title="Alertas de precio">🔔</button>
  <button id="layout-btn" title="Distribución de gráficos">▦</button>
  <button id="sidebar-btn" title="Lista de seguimiento">☰</button>
</header>

<div id="layout-menu" class="hidden">
  <button data-n="1" class="active" title="1 gráfico">▢</button>
  <button data-n="2" title="2 gráficos">▢▢</button>
  <button data-n="3" title="3 gráficos">▢▢▢</button>
  <button data-n="4" title="4 gráficos">▦</button>
</div>

<div id="tf-panel" class="drop-panel hidden">
  <div id="ctrl-tfs"></div>
</div>
<div id="ind-panel" class="drop-panel hidden">
  <div id="ctrl-inds"></div>
</div>
<div id="draw-panel" class="drop-panel hidden">
  <div id="draw-tools"></div>
</div>

<div id="status" class="hidden"></div>

<div id="main-row">
  <div id="charts-grid" class="layout-1">
  <main id="chart-wrap">
    <div id="draw-style" class="hidden">
      <div id="draw-colors"></div>
      <div class="draw-style-sep"></div>
      <button class="dw" data-w="1" title="Fino">▏</button>
      <button class="dw" data-w="2" title="Medio">│</button>
      <button class="dw" data-w="4" title="Grueso">┃</button>
    </div>
    <div id="chart"></div>
    <div id="legend"></div>
    <div id="trade-chips" class="hidden">
      <div class="chip sell"><span id="sell-price">—</span><small>SELL</small></div>
      <div id="spread">—</div>
      <div class="chip buy"><span id="buy-price">—</span><small>BUY</small></div>
    </div>
  </main>
  <div class="sec-cell" data-i="1"></div>
  <div class="sec-cell" data-i="2"></div>
  <div class="sec-cell" data-i="3"></div>
  </div>

  <aside id="sidebar">
    <div id="watchlist">
      <div class="wl-header">
        <button id="wl-list-btn" title="Elegir lista">Principal ▾</button>
        <button id="wl-add" title="Agregar símbolo">+</button>
      </div>
      <div id="wl-menu" class="hidden">
        <div id="wl-menu-lists"></div>
        <div class="wl-menu-sep"></div>
        <button class="wl-menu-item" id="wl-new">＋ Nueva lista…</button>
        <button class="wl-menu-item" id="wl-rename">✎ Renombrar esta lista…</button>
        <div id="wl-name-form" class="hidden">
          <input id="wl-name-input" maxlength="30" placeholder="Nombre de la lista"
                 spellcheck="false" autocomplete="off">
          <button id="wl-name-ok">OK</button>
        </div>
        <button class="wl-menu-item danger" id="wl-delete">🗑 Eliminar esta lista</button>
      </div>
      <div class="wl-cols">
        <span>Symbol</span><span>Last</span><span>Chg</span><span>Chg%</span><span></span><span></span>
      </div>
      <div id="wl-body"></div>
    </div>

    <div id="symbol-info">
      <div class="si-name"><span id="si-symbol">—</span></div>
      <div class="si-desc" id="si-desc">—</div>
      <div class="si-price">
        <span id="si-last">—</span>
        <span class="si-cur" id="si-currency">USDT</span>
      </div>
      <div class="si-change" id="si-change">—</div>
      <div class="si-status" id="si-status"></div>
    </div>
  </aside>
</div>

<footer id="bottombar">
  <div></div>
  <div id="clock">—</div>
</footer>

<div id="alert-overlay" class="hidden">
  <div id="alert-dialog">
    <div class="dlg-head">
      <span>🔔 Alertas de precio</span>
      <button id="alert-x" title="Cerrar">✕</button>
    </div>
    <div class="alert-new">
      <div class="alert-sym" id="alert-sym">—</div>
      <label class="f-row">Condición
        <select id="alert-cond">
          <option value="above">Sube y cruza</option>
          <option value="below">Baja y cruza</option>
        </select>
      </label>
      <label class="f-row">Precio
        <input type="number" id="alert-price" step="any" inputmode="decimal">
      </label>
      <button id="alert-create">Crear alerta</button>
    </div>
    <div class="ctrl-title" style="padding: 0 18px;">Alertas</div>
    <div id="alert-list"></div>
  </div>
</div>

<div id="search-overlay" class="hidden">
  <div id="search-dialog">
    <div class="dlg-head">
      <span>Agregar símbolo</span>
      <button id="search-x" title="Cerrar">✕</button>
    </div>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input id="search-input" placeholder="Símbolo o nombre (ej: PEPE, Apple, oro)"
             spellcheck="false" autocomplete="off">
    </div>
    <div class="search-tabs">
      <button data-f="all" class="active">Todos</button>
      <button data-f="crypto">Cripto</button>
      <button data-f="stocks">Acciones · Índices</button>
    </div>
    <div class="search-dest">
      <span>Agregar a la sección:</span>
      <select id="search-section"></select>
    </div>
    <div id="search-results">
      <p class="search-hint">Escribí al menos 2 caracteres para buscar…</p>
    </div>
  </div>
</div>

<div id="dlg-overlay" class="hidden">
  <div id="ind-dialog">
    <div class="dlg-head">
      <span id="dlg-title">—</span>
      <button id="dlg-x" title="Cerrar">✕</button>
    </div>
    <div class="dlg-tabs">
      <button data-tab="inputs" class="active">Inputs</button>
      <button data-tab="style">Style</button>
    </div>
    <div id="dlg-body">
      <div id="dlg-inputs" class="dlg-panel"></div>
      <div id="dlg-style" class="dlg-panel hidden"></div>
    </div>
    <div class="dlg-foot">
      <button id="dlg-defaults" class="secondary">Defaults</button>
      <div class="dlg-foot-right">
        <button id="dlg-cancel" class="secondary">Cancel</button>
        <button id="dlg-ok">Ok</button>
      </div>
    </div>
  </div>
</div>

<script src="lib/lightweight-charts.js"></script>
<script src="indicators.js?v=26"></script>
<script src="drawings.js?v=26"></script>
<script src="app.js?v=26"></script>
</body>
</html>
